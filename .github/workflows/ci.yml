name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify generated code is up to date
        run: |
          dart run build_runner build --delete-conflicting-outputs
          git diff --exit-code -- '*.g.dart' || {
            echo '::error::Generated code is stale. Run build_runner and commit.'
            exit 1
          }

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

  build-android:
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build debug APK (dev flavor config)
        run: flutter build apk --debug --dart-define=APP_ENV=dev

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: homevault-dev-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      # Firebase App Distribution step activates once story 0.3 (Firebase
      # project) is done — needs FIREBASE_APP_ID + SERVICE_ACCOUNT secrets.
